name: Build Desktop App

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 0.1.0)'
        required: false
        default: '0.1.0'

jobs:
  generate-icons:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SVG conversion tools
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Convert SVG to PNG
        run: rsvg-convert -w 1024 -h 1024 frontend/public/aether_adaptive.svg -o icon.png

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate Tauri icon set
        run: npx @tauri-apps/cli@latest icon icon.png --output desktop/src-tauri/icons

      - name: Upload icons artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-icons
          path: desktop/src-tauri/icons/

  build:
    needs: generate-icons
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            rust_targets: 'aarch64-apple-darwin'
            pyinstaller_name: aether-server
            sidecar_name: aether-server-aarch64-apple-darwin
          - platform: ubuntu-22.04
            target: ''
            rust_targets: ''
            pyinstaller_name: aether-server
            sidecar_name: aether-server-x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: ''
            rust_targets: ''
            pyinstaller_name: aether-server.exe
            sidecar_name: aether-server-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Download icons
        uses: actions/download-artifact@v4
        with:
          name: app-icons
          path: desktop/src-tauri/icons/

      # ── Python: build backend with PyInstaller ──

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install -e ".[all]" 2>/dev/null || pip install -e .
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend for embedding
        working-directory: frontend
        env:
          VITE_API_URL: http://127.0.0.1:8084
        run: |
          npm ci
          npm run build

      - name: Build backend with PyInstaller (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          pyinstaller --onefile \
            --name aether-server \
            --add-data "src:src" \
            --add-data "frontend/dist:frontend_dist" \
            --collect-submodules uvicorn \
            --collect-submodules sqlalchemy \
            --collect-submodules pydantic \
            --collect-submodules starlette \
            --collect-submodules fastapi \
            --collect-submodules httpx \
            --collect-submodules asyncpg \
            --collect-submodules cryptography \
            --collect-submodules bcrypt \
            --collect-submodules openai \
            --collect-submodules loguru \
            --collect-submodules apscheduler \
            --collect-submodules prometheus_client \
            --collect-submodules tiktoken \
            --hidden-import tiktoken_ext.openai_public \
            --hidden-import tiktoken_ext \
            --hidden-import psycopg2 \
            --hidden-import aiohttp \
            --hidden-import aiosmtplib \
            --hidden-import dotenv \
            --hidden-import email_validator \
            desktop/entry.py

      - name: Build backend with PyInstaller (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          pyinstaller --onefile \
            --name aether-server \
            --add-data "src;src" \
            --add-data "frontend/dist;frontend_dist" \
            --collect-submodules uvicorn \
            --collect-submodules sqlalchemy \
            --collect-submodules pydantic \
            --collect-submodules starlette \
            --collect-submodules fastapi \
            --collect-submodules httpx \
            --collect-submodules asyncpg \
            --collect-submodules cryptography \
            --collect-submodules bcrypt \
            --collect-submodules openai \
            --collect-submodules loguru \
            --collect-submodules apscheduler \
            --collect-submodules prometheus_client \
            --collect-submodules tiktoken \
            --hidden-import tiktoken_ext.openai_public \
            --hidden-import tiktoken_ext \
            --hidden-import psycopg2 \
            --hidden-import aiohttp \
            --hidden-import aiosmtplib \
            --hidden-import dotenv \
            --hidden-import email_validator \
            desktop/entry.py

      - name: Place sidecar binary
        shell: bash
        run: |
          mkdir -p desktop/src-tauri/binaries
          cp dist/${{ matrix.pyinstaller_name }} desktop/src-tauri/binaries/${{ matrix.sidecar_name }}

      # ── Rust: build Tauri desktop app ──

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Update version in Tauri config
        if: inputs.version != ''
        shell: bash
        run: |
          cd desktop/src-tauri
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('tauri.conf.json', 'utf8'));
            conf.version = '${{ inputs.version }}';
            fs.writeFileSync('tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "
          sed -i.bak 's/^version = ".*"/version = "${{ inputs.version }}"/' Cargo.toml
          rm -f Cargo.toml.bak

      - name: Build desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tauriScript: npx tauri
          tagName: desktop-v__VERSION__
          releaseName: 'Aether Desktop v__VERSION__'
          releaseBody: |
            Desktop application for Aether AI API Gateway.

            **Prerequisites:** PostgreSQL and Redis must be accessible.

            **Configuration:** Set environment variables before launching:
            - `DATABASE_URL` — PostgreSQL connection string
            - `REDIS_URL` — Redis connection string
            - `ADMIN_PASSWORD` — Initial admin password
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }}
