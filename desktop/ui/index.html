<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aether</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-user-select: none;
      user-select: none;
    }
    .container { text-align: center; }
    .logo {
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .status {
      font-size: 14px;
      color: #737373;
      margin-top: 24px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      margin: 24px auto 0;
      border: 3px solid #262626;
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #ef4444; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Aether</div>
    <div class="spinner" id="spinner"></div>
    <div class="status" id="status">Starting service...</div>
  </div>
  <script>
    const statusEl = document.getElementById('status');
    const spinnerEl = document.getElementById('spinner');
    let dots = 0;

    const dotInterval = setInterval(() => {
      dots = (dots + 1) % 4;
      statusEl.textContent = 'Starting service' + '.'.repeat(dots);
    }, 500);

    // Poll backend health (Rust side also handles navigation, this is a fallback)
    async function pollBackend() {
      for (let i = 0; i < 120; i++) {
        try {
          const resp = await fetch('http://127.0.0.1:8084/health', {
            signal: AbortSignal.timeout(2000)
          });
          if (resp.ok) {
            clearInterval(dotInterval);
            statusEl.textContent = 'Connected!';
            setTimeout(() => {
              window.location.replace('http://127.0.0.1:8084');
            }, 300);
            return;
          }
        } catch {}
        await new Promise(r => setTimeout(r, 1000));
      }
      clearInterval(dotInterval);
      spinnerEl.style.display = 'none';
      statusEl.className = 'status error';
      statusEl.textContent = 'Failed to start service. Check DATABASE_URL and REDIS_URL.';
    }
    pollBackend();
  </script>
</body>
</html>
